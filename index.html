<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i class="fas fa-graduation-cap"></i>
                <span>AttendanceHub</span>
            </div>
            <ul class="nav-menu">
                <li class="nav-item active">
                    <a href="#" onclick="showSection('dashboard')">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" onclick="showSection('students')">
                        <i class="fas fa-users"></i>
                        <span>Students</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" onclick="showSection('attendance')">
                        <i class="fas fa-clipboard-check"></i>
                        <span>Mark Attendance</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" onclick="showSection('reports')">
                        <i class="fas fa-chart-bar"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="date-time">
                        <span id="current-date"></span>
                        <span id="current-time"></span>
                    </div>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard-section" class="content-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="total-students">0</h3>
                            <p>Total Students</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon present">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="present-today">0</h3>
                            <p>Present Today</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon absent">
                            <i class="fas fa-times-circle"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="absent-today">0</h3>
                            <p>Absent Today</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-percentage"></i>
                        </div>
                        <div class="stat-content">
                            <h3 id="attendance-rate">0%</h3>
                            <p>Attendance Rate</p>
                        </div>
                    </div>
                </div>

                <div class="dashboard-charts">
                    <div class="chart-card">
                        <h3>Recent Attendance</h3>
                        <div class="recent-attendance" id="recent-attendance">
                            <!-- Recent attendance data will be populated here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Students Section -->
            <section id="students-section" class="content-section">
                <div class="section-header">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="student-search" placeholder="Search students...">
                    </div>
                    <button class="btn btn-primary" onclick="showAddStudentModal()">
                        <i class="fas fa-plus"></i>
                        Add Student
                    </button>
                </div>

                <div class="students-grid" id="students-grid">
                    <!-- Student cards will be populated here -->
                </div>
            </section>

            <!-- Attendance Section -->
            <section id="attendance-section" class="content-section">
                <div class="attendance-header">
                    <h3>Mark Attendance - <span id="attendance-date"></span></h3>
                    <div class="attendance-actions">
                        <button class="btn btn-success" onclick="markAllPresent()">
                            <i class="fas fa-check-double"></i>
                            Mark All Present
                        </button>
                        <button class="btn btn-danger" onclick="markAllAbsent()">
                            <i class="fas fa-times"></i>
                            Mark All Absent
                        </button>
                    </div>
                </div>

                <div class="attendance-list" id="attendance-list">
                    <!-- Attendance list will be populated here -->
                </div>

                <div class="attendance-submit">
                    <button class="btn btn-primary btn-large" onclick="saveAttendance()">
                        <i class="fas fa-save"></i>
                        Save Attendance
                    </button>
                </div>
            </section>

            <!-- Reports Section -->
            <section id="reports-section" class="content-section">
                <div class="reports-header">
                    <h3>Attendance Reports</h3>
                    <div class="date-range">
                        <input type="date" id="start-date">
                        <span>to</span>
                        <input type="date" id="end-date">
                        <button class="btn btn-primary" onclick="generateReport()">
                            <i class="fas fa-chart-line"></i>
                            Generate Report
                        </button>
                    </div>
                </div>

                <div class="report-content" id="report-content">
                    <!-- Report content will be populated here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Add Student Modal -->
    <div id="add-student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Student</h3>
                <button class="close-btn" onclick="closeModal('add-student-modal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="add-student-form">
                <div class="form-group">
                    <label for="student-name">Student Name</label>
                    <input type="text" id="student-name" required>
                </div>
                <div class="form-group">
                    <label for="student-id">Student ID</label>
                    <input type="text" id="student-id" required>
                </div>
                <div class="form-group">
                    <label for="student-class">Class</label>
                    <input type="text" id="student-class" required>
                </div>
                <div class="form-group">
                    <label for="student-email">Email</label>
                    <input type="email" id="student-email">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-student-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Student Modal -->
    <div id="edit-student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Student</h3>
                <button class="close-btn" onclick="closeModal('edit-student-modal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="edit-student-form">
                <input type="hidden" id="edit-student-index">
                <div class="form-group">
                    <label for="edit-student-name">Student Name</label>
                    <input type="text" id="edit-student-name" required>
                </div>
                <div class="form-group">
                    <label for="edit-student-id">Student ID</label>
                    <input type="text" id="edit-student-id" required>
                </div>
                <div class="form-group">
                    <label for="edit-student-class">Class</label>
                    <input type="text" id="edit-student-class" required>
                </div>
                <div class="form-group">
                    <label for="edit-student-email">Email</label>
                    <input type="email" id="edit-student-email">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('edit-student-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Student</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
