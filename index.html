<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCare Pro: Vehicle Service & Repair Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts for Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* Custom styles and animations */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Light gray background */
            color: #1a202c; /* Dark text for contrast */
        }
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        .animate-fade-in-up {
            animation: fadeInUp 1s ease-out;
        }
        .animate-scale-in {
            animation: scaleIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .animate-bounce-slow {
            animation: bounceSlow 3s infinite ease-in-out;
        }
        .animate-pulse-slow {
            animation: pulseSlow 4s infinite ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes bounceSlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulseSlow {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.1); opacity: 0.2; }
        }
    </style>
</head>
<body class="min-h-screen antialiased">
    <header id="main-header" class="bg-gradient-to-r from-blue-900 to-blue-800 text-white shadow-lg py-4 px-6 md:px-12 rounded-b-xl">
        <nav class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-amber-300 to-amber-500 mb-4 md:mb-0">
                AutoCare Pro
            </h1>
            <ul class="flex flex-wrap justify-center space-x-4 md:space-x-8">
                <li>
                    <button id="nav-home" class="text-lg hover:text-amber-400 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-amber-400 rounded-md px-3 py-1">
                        Home
                    </button>
                </li>
                <li>
                    <button id="nav-book" class="text-lg hover:text-amber-400 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-amber-400 rounded-md px-3 py-1">
                        Book Service
                    </button>
                </li>
                <li>
                    <button id="nav-vehicles" class="text-lg hover:text-amber-400 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-amber-400 rounded-md px-3 py-1">
                        My Vehicles
                    </button>
                </li>
                <li>
                    <button id="nav-admin" class="text-lg hover:text-amber-400 transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-amber-400 rounded-md px-3 py-1">
                        Admin Dashboard
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main id="app-content" class="pb-12"></main>

    <footer class="bg-gray-900 text-white py-8 px-6 md:px-12 text-center rounded-t-xl mt-12">
        <div class="container mx-auto">
            <p class="text-lg mb-4">
                &copy; <span id="current-year"></span> AutoCare Pro: Vehicle Service & Repair. All rights reserved.
            </p>
            <div class="flex justify-center space-x-6 text-2xl">
                <a href="#" class="hover:text-amber-400 transition duration-300"><i class="fab fa-facebook"></i></a>
                <a href="#" class="hover:text-amber-400 transition duration-300"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-amber-400 transition duration-300"><i class="fab fa-twitter"></i></a>
                <a href="#" class="hover:text-amber-400 transition duration-300"><i class="fab fa-linkedin"></i></a>
            </div>
            <p class="text-sm mt-4 text-gray-400">Committed to keeping you safely on the road.</p>
        </div>
    </footer>

    <script>
        // Global State Variables
        let currentPage = 'home';
        let vehicles = []; // User's registered vehicles
        let appointments = []; // All appointments
        let currentBooking = null; // Details of the current booking process

        // Mock Data (in-memory for demonstration)
        const mockServices = [
            { id: 'vs1', name: 'Standard Oil Change', price: 75, description: 'Premium synthetic oil and filter replacement.', icon: 'fa-oil-can' },
            { id: 'vs2', name: 'Tire Rotation & Balance', price: 50, description: 'Extends tire life and improves handling.', icon: 'fa-tire' },
            { id: 'vs3', name: 'Brake Inspection', price: 30, description: 'Thorough check of brake pads, rotors, and fluid.', icon: 'fa-car-burst' },
            { id: 'vs4', name: 'Engine Diagnostic', price: 99, description: 'Advanced computer diagnostics to identify issues.', icon: 'fa-engine' },
            { id: 'vs5', name: 'AC System Recharge', price: 120, description: 'Recharge and inspection of your vehicle\'s AC system.', icon: 'fa-fan' },
            { id: 'vs6', name: 'Wheel Alignment', price: 80, description: 'Ensures optimal vehicle handling and tire wear.', icon: 'fa-align-justify' },
        ];

        const mockMechanics = [
            { id: 'm1', name: 'Alex Turner', specialty: 'Engine & Electrical' },
            { id: 'm2', name: 'Maria Rodriguez', specialty: 'Brakes & Tires' },
            { id: 'm3', name: 'David Lee', specialty: 'AC & General Maintenance' },
        ];

        // --- Core Navigation and State Management ---

        // Function to navigate between pages and pass data if needed
        function navigateTo(page, data = {}) {
            currentPage = page;
            if (page === 'book' && data.preSelectedVehicleId) {
                // Pass pre-selected vehicle ID to booking form
                renderContent(data);
            } else {
                renderContent();
            }
        }

        // Function to handle booking submission
        function handleBookAppointment(bookingData) {
            const newAppointment = {
                ...bookingData,
                id: `appt-${appointments.length + 1}`,
                status: 'Pending',
                createdAt: new Date().toISOString(),
            };
            appointments.push(newAppointment); // Add to global array
            currentBooking = newAppointment; // Set for confirmation page
            navigateTo('confirmation');
        }

        // Function to add a new vehicle
        function handleAddVehicle(vehicleData) {
            const newVehicle = {
                ...vehicleData,
                id: `v${vehicles.length + 1}`,
            };
            vehicles.push(newVehicle); // Add to global array
            // After adding, re-render the vehicle management page to show the new vehicle
            renderVehicleManagement();
        }

        // --- Page Rendering Functions (Re-created from React components) ---

        function renderHomePage() {
            const contentDiv = document.getElementById('app-content');
            contentDiv.innerHTML = `
                <section class="relative bg-gradient-to-br from-blue-200 to-blue-50 min-h-[50vh] flex items-center justify-center overflow-hidden rounded-b-3xl shadow-inner mb-12">
                    <div class="absolute inset-0 bg-cover bg-center opacity-70"
                        style="background-image: url('https://placehold.co/1200x600/C0D9EE/34495E?text=Modern+Auto+Service');">
                    </div>
                    <div class="relative z-10 text-center text-gray-900 p-8 bg-white bg-opacity-80 rounded-2xl shadow-2xl backdrop-filter backdrop-blur-sm animate-fade-in-up">
                        <h2 class="text-5xl md:text-7xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-800 to-blue-600">
                            Your Vehicle, Our Priority
                        </h2>
                        <p class="text-xl md:text-2xl mb-8 font-medium text-gray-700">
                            Expert care and transparent service for every mile.
                        </p>
                        <button id="book-service-hero"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-full shadow-xl text-xl transform transition duration-300 hover:-translate-y-1 animate-bounce-slow">
                            Book a Service
                        </button>
                    </div>
                    <div class="absolute bottom-0 right-0 w-48 h-48 bg-blue-200 rounded-full opacity-10 blur-3xl animate-pulse-slow"></div>
                    <div class="absolute top-1/4 left-1/4 w-32 h-32 bg-gray-400 rounded-full opacity-10 blur-3xl animate-pulse-slow delay-500"></div>
                </section>
                <div id="service-catalog-container"></div>
            `;
            // Attach event listener for the hero button
            document.getElementById('book-service-hero').addEventListener('click', () => navigateTo('book'));

            // Render Service Catalog below hero
            renderServiceCatalog(mockServices, () => navigateTo('book'));
        }

        function renderServiceCatalog(services, onSelectService) {
            const contentDiv = document.getElementById('app-content');
            // Ensure the service catalog container exists or create it
            let catalogContainer = document.getElementById('service-catalog-container');
            if (!catalogContainer) {
                catalogContainer = document.createElement('div');
                catalogContainer.id = 'service-catalog-container';
                contentDiv.appendChild(catalogContainer);
            }

            catalogContainer.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <h2 class="text-4xl font-extrabold text-gray-800 mb-8 text-center animate-fade-in">
                        Our Expert Services
                    </h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${services.map(service => `
                            <div
                                class="bg-white rounded-2xl shadow-xl overflow-hidden transform transition duration-500 hover:scale-105 hover:shadow-2xl cursor-pointer service-card"
                                data-service-id="${service.id}"
                            >
                                <div class="p-6">
                                    <div class="text-blue-500 text-5xl mb-4 text-center">
                                        <i class="fas ${service.icon}"></i>
                                    </div>
                                    <h3 class="text-2xl font-semibold text-gray-900 mb-2 text-center">${service.name}</h3>
                                    <p class="text-gray-600 mb-4 text-sm text-center">${service.description}</p>
                                    <div class="flex justify-between items-center mt-4">
                                        <span class="text-2xl font-bold text-amber-600">$${service.price}</span>
                                        <button class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-full shadow-lg transform transition duration-300 hover:-translate-y-1">
                                            Select
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            // Attach event listeners to service cards
            document.querySelectorAll('.service-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const serviceId = card.dataset.serviceId;
                    const service = services.find(s => s.id === serviceId);
                    if (service && onSelectService) {
                        onSelectService(service);
                    }
                });
            });
        }

        function renderVehicleManagement() {
            const contentDiv = document.getElementById('app-content');
            let make = '';
            let model = '';
            let year = '';
            let licensePlate = '';
            let error = '';

            const updateVehicleForm = () => {
                contentDiv.innerHTML = `
                    <div class="container mx-auto px-4 py-8">
                        <h2 class="text-4xl font-extrabold text-gray-800 mb-8 text-center animate-fade-in">
                            Your Vehicles
                        </h2>
                        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8 mb-8">
                            <h3 class="text-2xl font-semibold text-gray-900 mb-6 text-center">Add a New Vehicle</h3>
                            ${error ? `
                                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl relative mb-4" role="alert">
                                    <strong class="font-bold">Error!</strong>
                                    <span class="block sm:inline ml-2">${error}</span>
                                </div>
                            ` : ''}
                            <form id="add-vehicle-form" class="space-y-4">
                                <div>
                                    <label for="make" class="block text-gray-700 text-lg font-medium mb-1">Make</label>
                                    <input type="text" id="make" value="${make}"
                                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., Toyota" />
                                </div>
                                <div>
                                    <label for="model" class="block text-gray-700 text-lg font-medium mb-1">Model</label>
                                    <input type="text" id="model" value="${model}"
                                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., Camry" />
                                </div>
                                <div>
                                    <label for="year" class="block text-gray-700 text-lg font-medium mb-1">Year</label>
                                    <input type="number" id="year" value="${year}"
                                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., 2020" />
                                </div>
                                <div>
                                    <label for="licensePlate" class="block text-gray-700 text-lg font-medium mb-1">License Plate</label>
                                    <input type="text" id="licensePlate" value="${licensePlate}"
                                        class="w-full p-3 border border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500" placeholder="e.g., ABC-123" />
                                </div>
                                <button type="submit"
                                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-full shadow-lg transform transition duration-300 hover:-translate-y-1">
                                    Add Vehicle
                                </button>
                            </form>
                        </div>

                        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                            <h3 class="text-2xl font-semibold text-gray-900 mb-6 text-center">Your Registered Vehicles</h3>
                            ${vehicles.length === 0 ? `
                                <p class="text-center text-gray-500 text-lg">You haven't added any vehicles yet.</p>
                            ` : `
                                <div class="space-y-4">
                                    ${vehicles.map(vehicle => `
                                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 flex items-center justify-between">
                                            <div>
                                                <p class="font-semibold text-lg text-gray-800">${vehicle.year} ${vehicle.make} ${vehicle.model}</p>
                                                <p class="text-gray-600 text-sm">License Plate: ${vehicle.licensePlate}</p>
                                            </div>
                                            <button data-vehicle-id="${vehicle.id}"
                                                class="book-service-for-vehicle-btn bg-amber-500 hover:bg-amber-600 text-white font-semibold py-2 px-4 rounded-full shadow-md text-sm transition duration-300">
                                                Book Service
                                            </button>
                                        </div>
                                    `).join('')}
                                </div>
                            `}
                        </div>
                    </div>
                `;

                // Attach event listeners after content is updated
                const addVehicleForm = document.getElementById('add-vehicle-form');
                if (addVehicleForm) {
                    document.getElementById('make').oninput = (e) => { make = e.target.value; setError(''); };
                    document.getElementById('model').oninput = (e) => { model = e.target.value; setError(''); };
                    document.getElementById('year').oninput = (e) => { year = e.target.value; setError(''); };
                    document.getElementById('licensePlate').oninput = (e) => { licensePlate = e.target.value; setError(''); };

                    addVehicleForm.onsubmit = (e) => {
                        e.preventDefault();
                        if (!make || !model || !year || !licensePlate) {
                            error = 'Please fill in all vehicle details.';
                            updateVehicleForm(); // Re-render to show error
                            return;
                        }
                        handleAddVehicle({ make, model, year, licensePlate });
                        // Reset form fields after successful addition
                        make = ''; model = ''; year = ''; licensePlate = ''; error = '';
                        updateVehicleForm(); // Re-render to clear form and show updated list
                    };
                }

                document.querySelectorAll('.book-service-for-vehicle-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const vehicleId = e.target.dataset.vehicleId;
                        navigateTo('book', { preSelectedVehicleId: vehicleId });
                    });
                });
            };
            updateVehicleForm(); // Initial render
        }

        function renderBookingForm(initialData = {}) {
            const contentDiv = document.getElementById('app-content');
            let selectedService = initialData.serviceId || '';
            let selectedVehicle = initialData.preSelectedVehicleId || '';
            let selectedMechanic = '';
            let selectedDate = '';
            let selectedTime = '';
            let customerName = '';
            let customerEmail = '';
            let error = '';
            let step = 1;

            const generateTimeSlots = () => {
                const slots = [];
                for (let i = 9; i <= 17; i++) { // 9 AM to 5 PM
                    slots.push(`${String(i).padStart(2, '0')}:00`);
                }
                return slots;
            };

            const updateBookingForm = () => {
                const currentService = mockServices.find(s => s.id === selectedService);
                const currentVehicle = vehicles.find(v => v.id === selectedVehicle);
                const currentMechanic = mockMechanics.find(m => m.id === selectedMechanic);

                contentDiv.innerHTML = `
                    <div class="container mx-auto px-4 py-8">
                        <h2 class="text-4xl font-extrabold text-gray-800 mb-8 text-center animate-fade-in">
                            Book Your Service Appointment
                        </h2>
                        <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-8">
                            <!-- Stepper Navigation -->
                            <div class="flex justify-between items-center mb-10 relative">
                                <div class="absolute top-1/2 left-0 right-0 h-1 bg-gray-200 -z-10 mx-6"></div>
                                <div class="absolute top-1/2 left-0 h-1 bg-blue-500 -z-10 transition-all duration-500"
                                    style="width: ${(step - 1) * 25}%;"></div>

                                ${['Service', 'Vehicle', 'Time', 'Contact', 'Confirm'].map((label, index) => `
                                    <div class="flex flex-col items-center flex-1">
                                        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-lg
                                            ${index + 1 <= step ? 'bg-blue-500' : 'bg-gray-300'} transition-colors duration-300">
                                            ${index + 1}
                                        </div>
                                        <span class="mt-2 text-sm md:text-base ${index + 1 <= step ? 'text-blue-700 font-semibold' : 'text-gray-500'}">
                                            ${label}
                                        </span>
                                    </div>
                                `).join('')}
                            </div>

                            <form id="booking-form" class="space-y-6">
                                ${error ? `
                                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl relative mb-4" role="alert">
                                        <strong class="font-bold">Error!</strong>
                                        <span class="block sm:inline ml-2">${error}</span>
                                    </div>
                                ` : ''}

                                <!-- Step 1: Select Service -->
                                ${step === 1 ? `
                                    <div class="space-y-4 animate-fade-in">
                                        <label for="service" class="block text-gray-700 text-lg font-medium mb-2">
                                            Choose Service:
                                        </label>
                                        <select id="service" class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg">
                                            <option value="" disabled selected>Select a service</option>
                                            ${mockServices.map(service => `
                                                <option value="${service.id}" ${selectedService === service.id ? 'selected' : ''}>
                                                    ${service.name} - $${service.price}
                                                </option>
                                            `).join('')}
                                        </select>
                                    </div>
                                ` : ''}

                                <!-- Step 2: Select Vehicle -->
                                ${step === 2 ? `
                                    <div class="space-y-4 animate-fade-in">
                                        <label for="vehicle" class="block text-gray-700 text-lg font-medium mb-2">
                                            Select Your Vehicle:
                                        </label>
                                        ${vehicles.length === 0 ? `
                                            <p class="text-gray-500">No vehicles added yet. Go to <button type="button" id="go-to-vehicles-btn" class="text-blue-600 underline">My Vehicles</button> to add one.</p>
                                        ` : `
                                            <select id="vehicle" class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg">
                                                <option value="" disabled selected>Select your vehicle</option>
                                                ${vehicles.map(vehicle => `
                                                    <option value="${vehicle.id}" ${selectedVehicle === vehicle.id ? 'selected' : ''}>
                                                        ${vehicle.year} ${vehicle.make} ${vehicle.model} (${vehicle.licensePlate})
                                                    </option>
                                                `).join('')}
                                            </select>
                                        `}
                                    </div>
                                ` : ''}

                                <!-- Step 3: Select Date & Time -->
                                ${step === 3 ? `
                                    <div class="space-y-4 animate-fade-in">
                                        <div>
                                            <label for="date" class="block text-gray-700 text-lg font-medium mb-2">
                                                Preferred Date:
                                            </label>
                                            <input type="date" id="date" value="${selectedDate}"
                                                class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg"
                                                min="${new Date().toISOString().split('T')[0]}" />
                                        </div>
                                        <div>
                                            <label for="time" class="block text-gray-700 text-lg font-medium mb-2">
                                                Preferred Time:
                                            </label>
                                            <select id="time" value="${selectedTime}"
                                                class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg">
                                                <option value="" disabled selected>Select a time slot</option>
                                                ${generateTimeSlots().map(time => `
                                                    <option value="${time}" ${selectedTime === time ? 'selected' : ''}>${time}</option>
                                                `).join('')}
                                            </select>
                                        </div>
                                        <div>
                                            <label for="mechanic" class="block text-gray-700 text-lg font-medium mb-2">
                                                Preferred Mechanic (Optional):
                                            </label>
                                            <select id="mechanic" value="${selectedMechanic}"
                                                class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg">
                                                <option value="">Any Mechanic</option>
                                                ${mockMechanics.map(mechanic => `
                                                    <option value="${mechanic.id}" ${selectedMechanic === mechanic.id ? 'selected' : ''}>
                                                        ${mechanic.name} (${mechanic.specialty})
                                                    </option>
                                                `).join('')}
                                            </select>
                                        </div>
                                    </div>
                                ` : ''}

                                <!-- Step 4: Contact Details -->
                                ${step === 4 ? `
                                    <div class="space-y-4 animate-fade-in">
                                        <div>
                                            <label for="customerName" class="block text-gray-700 text-lg font-medium mb-2">
                                                Your Full Name:
                                            </label>
                                            <input type="text" id="customerName" value="${customerName}"
                                                class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg"
                                                placeholder="John Doe" />
                                        </div>
                                        <div>
                                            <label for="customerEmail" class="block text-gray-700 text-lg font-medium mb-2">
                                                Your Email:
                                            </label>
                                            <input type="email" id="customerEmail" value="${customerEmail}"
                                                class="block w-full p-4 border border-gray-300 rounded-xl shadow-sm focus:ring-blue-500 focus:border-blue-500 transition duration-300 text-lg"
                                                placeholder="john.doe@example.com" />
                                        </div>
                                    </div>
                                ` : ''}

                                <!-- Step 5: Confirmation Summary -->
                                ${step === 5 ? `
                                    <div class="space-y-4 animate-fade-in text-gray-700 text-lg">
                                        <h3 class="text-2xl font-semibold mb-4 text-center">Review Your Appointment</h3>
                                        <p><strong>Service:</strong> ${currentService?.name || 'N/A'}</p>
                                        <p><strong>Vehicle:</strong> ${currentVehicle ? `${currentVehicle.year} ${currentVehicle.make} ${currentVehicle.model}` : 'N/A'}</p>
                                        <p><strong>Date:</strong> ${selectedDate}</p>
                                        <p><strong>Time:</strong> ${selectedTime}</p>
                                        <p><strong>Mechanic:</strong> ${currentMechanic?.name || 'Any'}</p>
                                        <p><strong>Client:</strong> ${customerName}</p>
                                        <p><strong>Email:</strong> ${customerEmail}</p>
                                    </div>
                                ` : ''}

                                <div class="flex justify-between mt-8">
                                    ${step > 1 ? `
                                        <button type="button" id="prev-step-btn"
                                            class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 px-8 rounded-full shadow-md transition duration-300">
                                            Previous
                                        </button>
                                    ` : ''}
                                    ${step < 5 ? `
                                        <button type="button" id="next-step-btn"
                                            class="ml-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transform transition duration-300 hover:-translate-y-1">
                                            Next
                                        </button>
                                    ` : ''}
                                    ${step === 5 ? `
                                        <button type="submit" id="confirm-booking-btn"
                                            class="ml-auto bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transform transition duration-300 hover:-translate-y-1">
                                            Confirm Appointment
                                        </button>
                                    ` : ''}
                                </div>
                            </form>
                        </div>
                    </div>
                `;

                // Attach event listeners after the form is rendered
                const bookingForm = document.getElementById('booking-form');
                if (bookingForm) {
                    const serviceSelect = document.getElementById('service');
                    if (serviceSelect) serviceSelect.onchange = (e) => { selectedService = e.target.value; error = ''; updateBookingForm(); };

                    const goToVehiclesBtn = document.getElementById('go-to-vehicles-btn');
                    if (goToVehiclesBtn) goToVehiclesBtn.onclick = () => navigateTo('vehicles');

                    const vehicleSelect = document.getElementById('vehicle');
                    if (vehicleSelect) vehicleSelect.onchange = (e) => { selectedVehicle = e.target.value; error = ''; };

                    const dateInput = document.getElementById('date');
                    if (dateInput) dateInput.onchange = (e) => { selectedDate = e.target.value; error = ''; };

                    const timeSelect = document.getElementById('time');
                    if (timeSelect) timeSelect.onchange = (e) => { selectedTime = e.target.value; error = ''; };

                    const mechanicSelect = document.getElementById('mechanic');
                    if (mechanicSelect) mechanicSelect.onchange = (e) => { selectedMechanic = e.target.value; error = ''; };

                    const customerNameInput = document.getElementById('customerName');
                    if (customerNameInput) customerNameInput.onchange = (e) => { customerName = e.target.value; error = ''; };

                    const customerEmailInput = document.getElementById('customerEmail');
                    if (customerEmailInput) customerEmailInput.onchange = (e) => { customerEmail = e.target.value; error = ''; };

                    const prevBtn = document.getElementById('prev-step-btn');
                    if (prevBtn) {
                        prevBtn.onclick = () => {
                            step--;
                            error = '';
                            updateBookingForm();
                        };
                    }
                    const nextBtn = document.getElementById('next-step-btn');
                    if (nextBtn) {
                        nextBtn.onclick = () => {
                            if (step === 1 && !selectedService) {
                                error = 'Please select a service.'; updateBookingForm(); return;
                            }
                            if (step === 2 && !selectedVehicle) {
                                error = 'Please select your vehicle.'; updateBookingForm(); return;
                            }
                            if (step === 3 && (!selectedDate || !selectedTime)) {
                                error = 'Please select a date and time.'; updateBookingForm(); return;
                            }
                            if (step === 4 && (!customerName || !customerEmail)) {
                                error = 'Please enter your contact details.'; updateBookingForm(); return;
                            }
                            step++;
                            error = '';
                            updateBookingForm();
                        };
                    }

                    bookingForm.onsubmit = (e) => {
                        e.preventDefault();
                        if (!selectedService || !selectedVehicle || !selectedDate || !selectedTime || !customerName || !customerEmail) {
                            error = 'Please fill in all required fields.'; updateBookingForm(); return;
                        }
                        handleBookAppointment({
                            serviceId: selectedService,
                            vehicleId: selectedVehicle,
                            mechanicId: selectedMechanic || null,
                            date: selectedDate,
                            time: selectedTime,
                            customerName,
                            customerEmail,
                        });
                    };
                }
            };
            updateBookingForm(); // Initial render of the form
        }

        function renderConfirmationPage(booking) {
            const contentDiv = document.getElementById('app-content');
            if (!booking) {
                contentDiv.innerHTML = `
                    <div class="container mx-auto px-4 py-12 text-center text-gray-700">
                        <p class="text-xl">No booking details to display. Please book an appointment first.</p>
                        <button id="go-to-booking-btn"
                            class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transition duration-300 hover:-translate-y-1">
                            Go to Booking
                        </button>
                    </div>
                `;
                document.getElementById('go-to-booking-btn').addEventListener('click', () => navigateTo('book'));
                return;
            }

            const service = mockServices.find(s => s.id === booking.serviceId);
            const vehicle = vehicles.find(v => v.id === booking.vehicleId);
            const mechanic = mockMechanics.find(m => m.id === booking.mechanicId);
            const formattedDate = new Date(booking.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            contentDiv.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8 text-center animate-scale-in">
                        <div class="text-green-500 text-6xl mb-6">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h2 class="text-4xl font-extrabold text-gray-800 mb-4">
                            Appointment Confirmed!
                        </h2>
                        <p class="text-gray-600 text-lg mb-8">
                            Thank you, <span class="font-semibold text-blue-700">${booking.customerName}</span>! Your appointment has been successfully booked.
                        </p>

                        <div class="bg-gray-50 p-6 rounded-xl text-left border border-gray-100 shadow-inner mb-8">
                            <h3 class="text-2xl font-semibold text-gray-800 mb-4">Your Appointment Details:</h3>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Service:</strong> ${service?.name || 'N/A'}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Vehicle:</strong> ${vehicle ? `${vehicle.year} ${vehicle.make} ${vehicle.model} (${vehicle.licensePlate})` : 'N/A'}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Date:</strong> ${formattedDate}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Time:</strong> ${booking.time}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Mechanic:</strong> ${mechanic?.name || 'Any'}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Email:</strong> ${booking.customerEmail}
                            </p>
                            <p class="text-lg text-gray-700 mb-2">
                                <strong class="text-blue-700">Status:</strong> ${booking.status}
                            </p>
                        </div>

                        <button id="back-to-home-btn"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transform transition duration-300 hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
                            Back to Home
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('back-to-home-btn').addEventListener('click', () => navigateTo('home'));
        }

        function renderAdminDashboard() {
            const contentDiv = document.getElementById('app-content');
            // Simple analytics calculations
            const totalAppointments = appointments.length;
            const pendingAppointments = appointments.filter(a => a.status === 'Pending').length;
            const completedAppointments = appointments.filter(a => a.status === 'Completed').length;

            // Group appointments by mechanic
            const mechanicWorkload = mockMechanics.map(mech => ({
                name: mech.name,
                count: appointments.filter(a => a.mechanicId === mech.id).length,
            }));

            // Group appointments by service
            const serviceDemand = mockServices.map(svc => ({
                name: svc.name,
                count: appointments.filter(a => a.serviceId === svc.id).length,
            }));

            // Helper to render a basic bar chart
            const renderBarChart = (data, title, valueKey, labelKey, colorClass = 'bg-blue-400') => {
                const maxVal = Math.max(...data.map(d => d[valueKey]));
                return `
                    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
                        <h3 class="text-xl font-semibold text-gray-800 mb-4">${title}</h3>
                        ${data.map(item => `
                            <div class="flex items-center mb-2">
                                <span class="w-1/3 text-gray-700">${item[labelKey]}</span>
                                <div class="w-2/3 bg-gray-200 rounded-full h-4 relative">
                                    <div
                                        class="${colorClass} h-full rounded-full transition-all duration-500 ease-out"
                                        style="width: ${((item[valueKey] / (maxVal || 1)) * 100)}%;"
                                    ></div>
                                    <span class="absolute right-2 text-xs text-gray-700">${item[valueKey]}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            };

            const renderJobCard = (appointment) => {
                const service = mockServices.find(s => s.id === appointment.serviceId);
                const vehicle = vehicles.find(v => v.id === appointment.vehicleId);
                const mechanic = mockMechanics.find(m => m.id === appointment.mechanicId);

                return `
                    <div class="bg-white rounded-2xl shadow-md p-5 border border-gray-100 flex flex-col space-y-2">
                        <p class="text-lg font-semibold text-gray-900">Appointment ID: ${appointment.id}</p>
                        <p class="text-gray-700"><strong>Customer:</strong> ${appointment.customerName}</p>
                        <p class="text-gray-700"><strong>Vehicle:</strong> ${vehicle ? `${vehicle.make} ${vehicle.model}` : 'N/A'}</p>
                        <p class="text-gray-700"><strong>Service:</strong> ${service?.name || 'N/A'}</p>
                        <p class="text-gray-700"><strong>Date/Time:</strong> ${appointment.date} at ${appointment.time}</p>
                        <p class="text-gray-700"><strong>Mechanic:</strong> ${mechanic?.name || 'Unassigned'}</p>
                        <span class="px-3 py-1 rounded-full text-sm font-medium self-start
                            ${appointment.status === 'Pending' ? 'bg-amber-100 text-amber-800' :
                              appointment.status === 'Completed' ? 'bg-green-100 text-green-800' :
                              'bg-blue-100 text-blue-800'}">
                            ${appointment.status}
                        </span>
                    </div>
                `;
            };


            contentDiv.innerHTML = `
                <div class="container mx-auto px-4 py-8">
                    <h2 class="text-4xl font-extrabold text-gray-800 mb-8 text-center animate-fade-in">
                        Admin Dashboard: Service Operations
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-10">
                        <div class="bg-blue-100 rounded-2xl shadow-xl p-6 border border-blue-200 transform transition duration-500 hover:scale-105">
                            <h3 class="text-xl font-semibold text-blue-900 mb-3 flex items-center">
                                <i class="fas fa-calendar-alt text-blue-600 mr-3"></i> Total Appointments
                            </h3>
                            <p class="text-4xl font-bold text-blue-700">${totalAppointments}</p>
                        </div>
                        <div class="bg-amber-100 rounded-2xl shadow-xl p-6 border border-amber-200 transform transition duration-500 hover:scale-105">
                            <h3 class="text-xl font-semibold text-amber-900 mb-3 flex items-center">
                                <i class="fas fa-hourglass-half text-amber-600 mr-3"></i> Pending Appointments
                            </h3>
                            <p class="text-4xl font-bold text-amber-700">${pendingAppointments}</p>
                        </div>
                        <div class="bg-green-100 rounded-2xl shadow-xl p-6 border border-green-200 transform transition duration-500 hover:scale-105">
                            <h3 class="text-xl font-semibold text-green-900 mb-3 flex items-center">
                                <i class="fas fa-check-circle text-green-600 mr-3"></i> Completed Jobs
                            </h3>
                            <p class="text-4xl font-bold text-green-700">${completedAppointments}</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                        ${renderBarChart(mechanicWorkload, "Mechanic Workload", "count", "name", "bg-blue-400")}
                        ${renderBarChart(serviceDemand, "Service Demand", "count", "name", "bg-amber-400")}
                    </div>

                    <h3 class="text-3xl font-extrabold text-gray-800 mb-6 text-center">Upcoming Appointments</h3>
                    ${appointments.length === 0 ? `
                        <p class="text-center text-gray-500 text-lg">No appointments scheduled yet.</p>
                    ` : `
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${appointments.map(appt => renderJobCard(appt)).join('')}
                        </div>
                    `}
                </div>
            `;
        }

        // Main content rendering logic based on currentPage
        function renderContent(data = {}) {
            switch (currentPage) {
                case 'home':
                    renderHomePage();
                    break;
                case 'book':
                    renderBookingForm(data); // Pass data for pre-selected vehicle
                    break;
                case 'vehicles':
                    renderVehicleManagement();
                    break;
                case 'confirmation':
                    renderConfirmationPage(currentBooking);
                    break;
                case 'admin':
                    renderAdminDashboard();
                    break;
                default:
                    // Fallback for unknown pages
                    document.getElementById('app-content').innerHTML = `
                        <div class="container mx-auto px-4 py-12 text-center text-gray-700">
                            <p class="text-2xl font-semibold">Page not found.</p>
                            <button id="go-to-home-default"
                                class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full shadow-lg transition duration-300 hover:-translate-y-1">
                                Go to Home
                            </button>
                        </div>
                    `;
                    document.getElementById('go-to-home-default').addEventListener('click', () => navigateTo('home'));
                    break;
            }
        }

        // --- Initialization on Document Load ---
        document.addEventListener('DOMContentLoaded', () => {
            // Set current year in footer
            document.getElementById('current-year').textContent = new Date().getFullYear();

            // Add event listeners for global navigation buttons
            document.getElementById('nav-home').addEventListener('click', () => navigateTo('home'));
            document.getElementById('nav-book').addEventListener('click', () => navigateTo('book'));
            document.getElementById('nav-vehicles').addEventListener('click', () => navigateTo('vehicles'));
            document.getElementById('nav-admin').addEventListener('click', () => navigateTo('admin'));

            // Initial render of the home page
            renderContent();
        });
    </script>
</body>
</html>
